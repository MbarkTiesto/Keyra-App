    <!-- Local Fonts & Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-Regular.woff2') format('woff2');
            font-weight: 400 800;
            font-display: swap;
        }
    </style>

    <!-- Font Awesome 6 (Local/Offline) -->
    <link rel="stylesheet" href="css/all.min.css">

    <!-- CSS Architecture -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Instant Theme Application: OS Detection for Auth ONLY -->
    <script>
        (function () {
            function applyAppTheme() {
                const theme = localStorage.getItem('keyra_theme') || 'auto';
                const authVessel = document.getElementById('auth-vessel');
                const isAuthActive = !authVessel || !authVessel.classList.contains('hidden');

                let themeToApply = theme;
                if (theme === 'auto' || isAuthActive) {
                    themeToApply = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }

                document.documentElement.setAttribute('data-theme', themeToApply);
                document.body.classList.remove('light-theme', 'dark-theme');
                document.body.classList.add(themeToApply + '-theme');
            }
            applyAppTheme();
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyAppTheme);

            window.addEventListener('storage', (e) => {
                if (e.key === 'keyra_theme') applyAppTheme();
            });
        })();
    </script>
</head>
