<!-- Global Dynamic Modal System -->
<div id="modal-overlay" class="modal-overlay"></div>

<!-- Global Loading Overlay -->
<div id="loading-overlay" class="modal-overlay hidden" style="z-index: 99999;">
    <div class="loading-content">

        <!-- Neumorphic spinner stack -->
        <div class="nm-loader-stack">
            <!-- Layer 1: outermost raised disc -->
            <div class="nm-loader-outer-ring"></div>
            <!-- Layer 2: inset groove (arc track) -->
            <div class="nm-loader-groove"></div>
            <!-- Spinning arcs inside the groove -->
            <div class="nm-loader-arc nm-loader-arc--cw"></div>
            <div class="nm-loader-arc nm-loader-arc--ccw"></div>
            <!-- Layer 3: inner raised platform -->
            <div class="nm-loader-platform"></div>
            <!-- Layer 4: core logo disc -->
            <div class="nm-loader-core">
                <img src="assets/logo.png" class="nm-loader-logo" alt="">
            </div>
        </div>

        <!-- Text -->
        <div class="loading-text-group">
            <h2 id="loading-title" class="loading-title">Loading</h2>
            <p id="loading-subtitle" class="loading-subtitle">Please wait a moment</p>
        </div>

        <!-- Animated dots -->
        <div class="nm-loader-dots">
            <span></span><span></span><span></span>
        </div>

    </div>
</div>

<!-- Scripts -->
<script type="module" src="js/app.js"></script>

<!-- Dynamic Grain Layer -->
<div class="grain-overlay"></div>

<!-- Global Notification Container -->
<div id="toast-container"></div>
