<!-- Premium Authentication Overlay -->
<div id="auth-vessel" class="modal-overlay show">
    <div class="auth-container animate-fade-in">
        <button id="btn-auth-close" class="auth-close-btn" title="Exit Application">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <button id="btn-auth-back" class="auth-back-btn hidden" title="Back to Login">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="auth-container-scrollable">
            <div class="auth-header">
                <div class="brand-icon nm-logo-float">
                    <img src="assets/logo.png" class="app-logo-medium nm-logo">
                </div>
                <h1 class="auth-title">Keyra</h1>
                <p class="auth-subtitle">YOUR VAULT IS SECURE</p>
            </div>

            <div id="auth-entry-box">
                <div class="auth-entry-options">
                    <button id="btn-entry-login" class="entry-card-btn">
                        <div class="entry-btn-icon"><i class="fa-solid fa-vault"></i></div>
                        <div class="entry-btn-text">
                            <span class="entry-btn-title">Unlock Vault</span>
                            <span class="entry-btn-desc">Sign in to your existing vault</span>
                        </div>
                    </button>
                    <button id="btn-entry-signup" class="entry-card-btn">
                        <div class="entry-btn-icon cloud-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                        <div class="entry-btn-text">
                            <span class="entry-btn-title">Create Cloud Vault</span>
                            <span class="entry-btn-desc">Sync across devices with GitHub</span>
                        </div>
                    </button>
                    <button id="btn-entry-local" class="entry-card-btn">
                        <div class="entry-btn-icon local-icon"><i class="fa-solid fa-shield-halved"></i></div>
                        <div class="entry-btn-text">
                            <span class="entry-btn-title">Stay Offline</span>
                            <span class="entry-btn-desc">Local vault, no cloud sync</span>
                        </div>
                    </button>
                </div>
                <div class="auth-footer-divider"></div>
                <div class="auth-footer-options">
                    <div class="auth-footer-row secondary">
                        <span>Moving between machines?</span>
                        <button id="btn-show-resume" class="auth-link-special">Restore from GitHub</button>
                    </div>
                </div>
            </div>

            <!-- Login Box -->
            <div id="auth-login-box" class="hidden">
                <form id="form-login">
                    <div class="form-group">
                        <label class="form-label">Vault Identity</label>
                        <input type="text" id="login-username" class="form-input" placeholder="Name or +123456789" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Master Password</label>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary auth-submit-btn btn-shimmer">Unlock Vault</button>
                    <div id="login-error" class="auth-error"></div>
                </form>
            </div>

            <!-- Signup Box -->
            <div id="auth-signup-box" class="hidden">
                <form id="form-signup">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="signup-username" class="form-input" placeholder="John Doe" required>
                    </div>
                    <div class="form-group" id="signup-email-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="signup-email" class="form-input" placeholder="name@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="label-signup-password">Master Password</label>
                        <input type="password" id="signup-password" class="form-input" placeholder="Min 8 characters" required>
                    </div>
                    <input type="hidden" id="signup-is-local" value="false">
                    <button type="submit" id="btn-signup-submit" class="btn-primary auth-submit-btn btn-shimmer">Create Vault</button>
                    <div id="signup-error" class="auth-error"></div>
                </form>

                <div class="auth-footer-divider"></div>
                <div class="auth-footer-options">
                    <div class="auth-footer-row" id="local-toggle-container">
                        <p id="local-toggle-text">Need Cloud Sync? <button id="btn-toggle-local" class="auth-link-bold">Enable Online</button></p>
                    </div>
                </div>
            </div>

            <!-- Resume Box -->
            <div id="auth-resume-box" class="hidden">
                <h2 class="auth-verify-title">Restore your Vault</h2>
                <p class="auth-verify-subtitle">Provide your Private Sync credentials.</p>
                <form id="form-resume">
                    <div class="form-group">
                        <label class="form-label">Personal Access Token (PAT)</label>
                        <input type="password" id="resume-pat" class="form-input" placeholder="ghp_xxxxxxxxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Repository Owner</label>
                        <input type="text" id="resume-owner" class="form-input" placeholder="GitHub Username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Repository Name</label>
                        <input type="text" id="resume-repo" class="form-input" placeholder="e.g. keyra-vault" required>
                    </div>
                    <button type="submit" class="btn-primary auth-submit-btn">Continue to Restore</button>
                    <div id="resume-error" class="auth-error"></div>
                </form>

                <div class="auth-footer-divider"></div>
                <div class="auth-footer-options">
                    <div class="auth-footer-row">
                        <span>Lost access?</span>
                        <button id="btn-show-login-resume" class="auth-link-bold">Back to Sign In</button>
                    </div>
                </div>
            </div>

            <!-- Verify Box -->
            <div id="auth-verify-box" class="hidden">
                <h2 class="auth-verify-title">Verify it's You</h2>
                <p class="auth-verify-subtitle">Enter the 6-digit code we sent to your email.</p>
                <form id="form-verify">
                    <input type="hidden" id="verify-email-field">
                    <div class="verify-inputs">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                        <input type="text" maxlength="1" class="verify-digit form-input">
                    </div>
                    <button type="submit" class="btn-primary auth-submit-btn">Unlock</button>
                    <div id="verify-error" class="auth-error"></div>
                </form>
                <div class="auth-footer">
                    <button id="btn-resend-code" class="auth-resend-btn">Resend Code <span id="resend-timer"></span></button>
                </div>
            </div>
        </div>

        <!-- Auth Loading Overlay -->
        <div id="auth-loading-overlay" class="auth-loading-overlay hidden">
            <div class="auth-loader-content">
                <div class="auth-spinner-ring">
                    <div class="auth-spinner-inner"></div>
                </div>
                <p id="auth-loading-text" class="auth-loader-label">Unlocking Vault...</p>
                <p class="auth-loader-sublabel">SECURE CONNECTION</p>
            </div>
        </div>
    </div>
</div>
